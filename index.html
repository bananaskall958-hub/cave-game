<!DOCTYPE html>
<html>
<head>
  <title>Star Runner Deluxe</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      background: #020617;
      color: white;
    }

    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 18px;
      z-index: 10;
    }

    #player {
      width: 45px;
      height: 45px;
      position: absolute;
      border-radius: 12px;
    }

    .skin-blue { background: cyan; }
    .skin-red { background: hotpink; }
    .skin-green { background: lime; }

    #star {
      position: absolute;
      font-size: 40px;
      cursor: pointer;
    }

    .enemy {
      position: absolute;
      width: 40px;
      height: 40px;
      background: crimson;
      border-radius: 50%;
    }

    #screen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      z-index: 20;
      text-align: center;
    }

    button {
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
      margin: 8px;
    }
  </style>
</head>
<body>

<div id="hud">
  ⭐ Score: <span id="score">0</span><br>
  ⏱️ Time: <span id="time">30</span><br>
  🏆 Level: <span id="level">1</span>
</div>

<div id="player" class="skin-blue"></div>
<div id="star">⭐</div>

<div id="screen">
  <div id="title">Star Runner Deluxe</div>
  <div>
    <p>Choose Skin:</p>
    <button onclick="setSkin('skin-blue')">Blue</button>
    <button onclick="setSkin('skin-red')">Red</button>
    <button onclick="setSkin('skin-green')">Green</button>
  </div>
  <button onclick="startGame()">Start Game</button>
</div>

<audio id="collectSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="hitSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

<script>
  const player = document.getElementById("player");
  const star = document.getElementById("star");
  const scoreText = document.getElementById("score");
  const timeText = document.getElementById("time");
  const levelText = document.getElementById("level");
  const screen = document.getElementById("screen");

  const collectSound = document.getElementById("collectSound");
  const hitSound = document.getElementById("hitSound");

  let x = 100, y = 100;
  let score = 0;
  let time = 30;
  let level = 1;
  let speed = 10;
  let gameRunning = false;
  let enemies = [];

  function setSkin(skin) {
    player.className = skin;
  }

  function randomPos(el, size = 40) {
    el.style.left = Math.random() * (window.innerWidth - size) + "px";
    el.style.top = Math.random() * (window.innerHeight - size) + "px";
  }

  function spawnEnemies() {
    enemies.forEach(e => e.remove());
    enemies = [];

    for (let i = 0; i < level; i++) {
      const enemy = document.createElement("div");
      enemy.className = "enemy";
      randomPos(enemy);
      document.body.appendChild(enemy);
      enemies.push(enemy);
    }
  }

  function startGame() {
    score = 0;
    time = 30;
    level = 1;
    speed = 10;
    gameRunning = true;

    scoreText.textContent = score;
    timeText.textContent = time;
    levelText.textContent = level;

    screen.style.display = "none";
    randomPos(star);
    spawnEnemies();

    const timer = setInterval(() => {
      if (!gameRunning) return clearInterval(timer);
      time--;
      timeText.textContent = time;
      if (time <= 0) endGame();
    }, 1000);
  }

  function nextLevel() {
    level++;
    speed += 2;
    time = 30;
    levelText.textContent = level;
    timeText.textContent = time;
    spawnEnemies();
  }

  function endGame() {
    gameRunning = false;
    enemies.forEach(e => e.remove());
    enemies = [];
    screen.style.display = "flex";
    document.getElementById("title").innerHTML = `Game Over<br>Score: ${score}<br>Level Reached: ${level}`;
  }

  document.addEventListener("keydown", e => {
    if (!gameRunning) return;

    if (e.key === "ArrowRight") x += speed;
    if (e.key === "ArrowLeft") x -= speed;
    if (e.key === "ArrowDown") y += speed;
    if (e.key === "ArrowUp") y -= speed;

    player.style.left = x + "px";
    player.style.top = y + "px";

    checkCollisions();
  });

  function checkCollisions() {
    const p = player.getBoundingClientRect();
    const s = star.getBoundingClientRect();

    if (p.left < s.right && p.right > s.left && p.top < s.bottom && p.bottom > s.top) {
      score++;
      collectSound.play();
      scoreText.textContent = score;
      randomPos(star);
      if (score % 5 === 0) nextLevel();
    }

    enemies.forEach(enemy => {
      const e = enemy.getBoundingClientRect();
      if (p.left < e.right && p.right > e.left && p.top < e.bottom && p.bottom > e.top) {
        hitSound.play();
        endGame();
      }
    });
  }

  star.onclick = () => {
    if (!gameRunning) return;
    score += 2;
    collectSound.play();
    scoreText.textContent = score;
    randomPos(star);
  };
</script>

</body>
</html>
