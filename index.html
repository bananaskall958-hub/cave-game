<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOID_SENTINEL_FIXED</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        canvas { image-rendering: pixelated; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ff0055; text-shadow: 0 0 15px #ff0055; z-index: 10; }
        #boss-ui { position: absolute; top: 20px; width: 100%; display: none; flex-direction: column; align-items: center; z-index: 20; }
        .boss-bar { width: 60%; height: 20px; border: 2px solid #ff0055; }
        #boss-hp { width: 100%; height: 100%; background: #ff0055; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 24px;">DATA_PURGED: <span id="score">0</span></div>
    <div style="width: 200px; height: 8px; border: 1px solid #00f2ff; margin-top: 5px;">
        <div id="hp-bar" style="width: 100%; height: 100%; background: #00f2ff;"></div>
    </div>
</div>

<div id="boss-ui">
    <div style="color:#00f2ff; font-size: 32px;">!!! SENTINEL_DETECTED !!!</div>
    <div class="boss-bar"><div id="boss-hp"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- EMERGENCY STABLE BUILD ---
    let score = 0, hp = 100, isGameOver = false, bossActive = false, bossHP = 100;
    
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050005, 0.1);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(0.5);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Character Creator
    function createTex(color) {
        const can = document.createElement('canvas'); can.width = 32; can.height = 32;
        const ctx = can.getContext('2d');
        ctx.fillStyle = color; ctx.fillRect(8, 8, 16, 24);
        const tex = new THREE.CanvasTexture(can); tex.magFilter = THREE.NearestFilter; return tex;
    }

    const player = new THREE.Sprite(new THREE.SpriteMaterial({ map: createTex('#00f2ff') }));
    player.position.y = 1; scene.add(player);

    const enemies = [];
    const enemyMat = new THREE.SpriteMaterial({ map: createTex('#ff0055') });
    const bossMat = new THREE.SpriteMaterial({ map: createTex('#ff0055') });
    let boss = null;

    const pulseRing = new THREE.Mesh(new THREE.TorusGeometry(1, 0.1, 16, 100), new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true }));
    pulseRing.rotation.x = Math.PI/2; scene.add(pulseRing);
    scene.add(new THREE.GridHelper(1000, 100, 0x440022, 0x050005));

    const keys = {};
    window.onkeydown = (e) => { 
        keys[e.code] = true; 
        if(e.code === 'Space') {
            pulseRing.position.copy(player.position); pulseRing.scale.set(1,1,1); pulseRing.material.opacity = 1;
            enemies.forEach(en => { if(player.position.distanceTo(en.position) < 10) en.dead = true; });
            if(boss && player.position.distanceTo(boss.position) < 15) {
                bossHP -= 20;
                document.getElementById('boss-hp').style.width = bossHP + '%';
                if(bossHP <= 0) { scene.remove(boss); boss = null; bossActive = false; document.getElementById('boss-ui').style.display='none'; score += 500; }
            }
        }
    };
    window.onkeyup = (e) => keys[e.code] = false;

    function spawn() {
        if(score >= 500 && !bossActive && !boss) {
            bossActive = true; boss = new THREE.Sprite(bossMat); boss.scale.set(10, 15, 1);
            boss.position.set(player.position.x, 7.5, player.position.z - 30);
            scene.add(boss); document.getElementById('boss-ui').style.display='flex';
        }
        const en = new THREE.Sprite(enemyMat);
        const a = Math.random() * 6.28;
        en.position.set(player.position.x + Math.cos(a)*25, 1, player.position.z + Math.sin(a)*25);
        scene.add(en); enemies.push(en);
        setTimeout(spawn, bossActive ? 600 : 1500);
    }
    spawn();

    function animate() {
        requestAnimationFrame(animate);
        const s = keys['ShiftLeft'] ? 0.25 : 0.15;
        if(keys['KeyW']) player.position.z -= s; if(keys['KeyS']) player.position.z += s;
        if(keys['KeyA']) player.position.x -= s; if(keys['KeyD']) player.position.x += s;

        enemies.forEach((en, i) => {
            en.position.add(player.position.clone().sub(en.position).normalize().multiplyScalar(0.08));
            if(player.position.distanceTo(en.position) < 1.2) { hp -= 0.2; document.getElementById('hp-bar').style.width = hp+'%'; }
            if(en.dead) { scene.remove(en); enemies.splice(i,1); score += 10; document.getElementById('score').innerText = score; }
        });

        if(boss) boss.position.add(player.position.clone().sub(boss.position).normalize().multiplyScalar(0.03));
        if(pulseRing.material.opacity > 0) { pulseRing.scale.multiplyScalar(1.1); pulseRing.material.opacity -= 0.05; }

        camera.position.lerp(new THREE.Vector3(player.position.x, 12, player.position.z + 12), 0.1);
        camera.lookAt(player.position);
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
