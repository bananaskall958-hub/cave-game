<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mango Isle 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        #controls { position: absolute; bottom: 20px; left: 20px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>MANGO ISLE</h1>
        <p>Mangoes Collected: <span id="score">0</span></p>
    </div>
    <div id="controls">Use <b>WASD</b> or <b>Arrows</b> to move | Walk into trees to harvest!</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Setup Scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // --- The Island ---
        const islandGeo = new THREE.CylinderGeometry(15, 18, 2, 32);
        const islandMat = new THREE.MeshStandardMaterial({ color: 0x7cfc00 });
        const island = new THREE.Mesh(islandGeo, islandMat);
        island.position.y = -1;
        scene.add(island);

        // --- Mango Trees ---
        const trees = [];
        function createTree(x, z) {
            const group = new THREE.Group();
            // Trunk
            const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.5, 2, 0.5), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
            trunk.position.y = 1;
            group.add(trunk);
            // Leaves
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.2, 8, 8), new THREE.MeshStandardMaterial({ color: 0x228B22 }));
            leaves.position.y = 2.5;
            group.add(leaves);
            // Mangoes (small orange dots)
            const mango = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffa500 }));
            mango.position.set(0.5, 2.2, 0.5);
            group.add(mango);

            group.position.set(x, 0, z);
            scene.add(group);
            trees.push(group);
        }

        // Spawn trees randomly
        for(let i=0; i<15; i++) {
            createTree(Math.random()*20-10, Math.random()*20-10);
        }

        // --- Player ---
        const player = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1, 4, 8), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
        player.position.y = 1;
        scene.add(player);

        camera.position.set(0, 10, 15);
        camera.lookAt(player.position);

        // --- Movement Logic ---
        const keys = {};
        let score = 0;
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function update() {
            const speed = 0.1;
            if (keys['KeyW'] || keys['ArrowUp']) player.position.z -= speed;
            if (keys['KeyS'] || keys['ArrowDown']) player.position.z += speed;
            if (keys['KeyA'] || keys['ArrowLeft']) player.position.x -= speed;
            if (keys['KeyD'] || keys['ArrowRight']) player.position.x += speed;

            // Simple Collision & Collection
            trees.forEach((tree, index) => {
                const dist = player.position.distanceTo(tree.position);
                if (dist < 1.5) {
                    score++;
                    document.getElementById('score').innerText = score;
                    scene.remove(tree);
                    trees.splice(index, 1);
                }
            });

            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 15;
            camera.lookAt(player.position);
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mango Isle: Boat Shop Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        #shop-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 15px; display: none; text-align: center; border: 2px solid #ffa500; }
        button { background: #ffa500; border: none; padding: 10px 20px; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background: #ff8c00; }
        .hint { position: absolute; bottom: 20px; width: 100%; text-align: center; color: white; text-shadow: 1px 1px 2px #000; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>MANGO ISLE</h1>
        <p>Mangoes: <span id="score">0</span></p>
        <p>Tool Level: <span id="tool-lvl">Basic Hands</span></p>
    </div>

    <div id="shop-ui">
        <h2>🚢 BOAT SHOP</h2>
        <p>Upgrade to <b>Golden Harvester</b></p>
        <p>Cost: 10 Mangoes</p>
        <button id="buy-btn">BUY UPGRADE</button>
        <br><br>
        <button onclick="document.getElementById('shop-ui').style.display='none'">CLOSE</button>
    </div>

    <div class="hint">WASD to Move | Touch falling mangoes | Visit the BOAT to upgrade!</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x40a4df); // Water color
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // --- Island & Boat ---
        const island = new THREE.Mesh(new THREE.CylinderGeometry(15, 16, 2, 32), new THREE.MeshStandardMaterial({ color: 0x7cfc00 }));
        island.position.y = -0.5;
        scene.add(island);

        const boat = new THREE.Mesh(new THREE.BoxGeometry(4, 1, 6), new THREE.MeshStandardMaterial({ color: 0x5C4033 }));
        boat.position.set(0, -0.2, -18); // Boat is in the water
        scene.add(boat);

        // --- Game State ---
        let mangoCount = 0;
        let hasUpgrade = false;
        const trees = [];
        const activeMangoes = [];

        // --- Tree Logic ---
        function createTree(x, z) {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.6, 3, 0.6), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
            trunk.position.y = 1.5;
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.5, 8, 8), new THREE.MeshStandardMaterial({ color: 0x228B22 }));
            leaves.position.y = 3.5;
            group.add(trunk, leaves);
            group.position.set(x, 0, z);
            scene.add(group);
            
            // Function to drop a mango
            const dropMango = () => {
                const mango = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffa500 }));
                mango.position.set(x + (Math.random()-0.5), 3.5, z + (Math.random()-0.5));
                scene.add(mango);
                activeMangoes.push(mango);
                
                // Respawn timer: Tree drops another in 5 seconds
                setTimeout(dropMango, 5000);
            };
            setTimeout(dropMango, Math.random() * 3000);
        }

        for(let i=0; i<10; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * 10;
            createTree(Math.cos(angle)*dist, Math.sin(angle)*dist);
        }

        // --- Player ---
        const player = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1, 4, 8), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        player.position.y = 1;
        scene.add(player);

        // --- Controls & Shop Trigger ---
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        document.getElementById('buy-btn').onclick = () => {
            if (mangoCount >= 10 && !hasUpgrade) {
                mangoCount -= 10;
                hasUpgrade = true;
                document.getElementById('score').innerText = mangoCount;
                document.getElementById('tool-lvl').innerText = "Golden Harvester (2x Luck)";
                document.getElementById('shop-ui').style.display = 'none';
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            
            // Movement
            const speed = 0.15;
            if (keys['KeyW']) player.position.z -= speed;
            if (keys['KeyS']) player.position.z += speed;
            if (keys['KeyA']) player.position.x -= speed;
            if (keys['KeyD']) player.position.x += speed;

            // Boat/Shop Collision
            if (player.position.distanceTo(boat.position) < 4) {
                document.getElementById('shop-ui').style.display = 'block';
            }

            // Mango Physics & Collection
            activeMangoes.forEach((m, i) => {
                if(m.position.y > 0.3) m.position.y -= 0.05; // Fall
                
                if(player.position.distanceTo(m.position) < 1) {
                    mangoCount += hasUpgrade ? 2 : 1;
                    document.getElementById('score').innerText = mangoCount;
                    scene.remove(m);
                    activeMangoes.splice(i, 1);
                }
            });

            camera.position.set(player.position.x, 12, player.position.z + 12);
            camera.lookAt(player.position);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
