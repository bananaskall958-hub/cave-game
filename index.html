<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-Minute 3D Game</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; /* Prevents scrollbars */
            background-color: #87CEEB; /* Fallback sky color */
        }
        canvas { 
            display: block; 
        }
        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none; /* Lets you click through the text */
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>3D World Explorer</h1>
        <p>Use <b>WASD</b> or <b>Arrow Keys</b> to move</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. Setup the Scene, Camera, and Renderer
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue background
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        // Enable shadows
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 2. Add Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        // 3. Create the "Character" (A 3D Cube)
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshStandardMaterial({ color: 0xff3366 }); // Pinkish red
        const player = new THREE.Mesh(geometry, material);
        player.position.y = 0.5; // Rest on top of the floor
        player.castShadow = true;
        scene.add(player);

        // 4. Create the Floor
        const floorGeometry = new THREE.PlaneGeometry(50, 50);
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x2ecc71 }); // Green grass
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2; // Lay it flat
        floor.receiveShadow = true;
        scene.add(floor);

        // Add some random obstacles to make it a "world"
        const boxGeo = new THREE.BoxGeometry(1, 2, 1);
        const boxMat = new THREE.MeshStandardMaterial({ color: 0x3498db });
        for(let i=0; i<20; i++) {
            const box = new THREE.Mesh(boxGeo, boxMat);
            box.position.x = (Math.random() - 0.5) * 40;
            box.position.z = (Math.random() - 0.5) * 40;
            box.position.y = 1;
            box.castShadow = true;
            box.receiveShadow = true;
            scene.add(box);
        }

        // 5. Setup Controls
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        
        document.addEventListener('keydown', (e) => {
            if(keys.hasOwnProperty(e.key)) keys[e.key] = true;
        });
        
        document.addEventListener('keyup', (e) => {
            if(keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        // 6. The Game Loop
        const speed = 0.15;

        function animate() {
            requestAnimationFrame(animate);

            // Move the player
            if (keys.w || keys.ArrowUp) player.position.z -= speed;
            if (keys.s || keys.ArrowDown) player.position.z += speed;
            if (keys.a || keys.ArrowLeft) player.position.x -= speed;
            if (keys.d || keys.ArrowRight) player.position.x += speed;

            // Make the camera follow the player
            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 8; // Stay 8 units behind
            camera.position.y = player.position.y + 5; // Stay 5 units above
            camera.lookAt(player.position);

            renderer.render(scene, camera);
        }

        // Handle window resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start the game
        animate();
    </script>
</body>
</html>
